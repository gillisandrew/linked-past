classes:
  Person:
    label: "Person"
    comment: "A historical person from the Roman Republic period."
    uri: "vocab:Person"
    properties:
      - pred: "vocab:hasPersonName"
        range: "xsd:string"
        comment: "Full display name. Format: \"DPRRID Praenomen Nomen (RE#) Filiation Cognomen\" (e.g. \"IUNI0001 L. Iunius (46a, Supb. 5.356ff.) M. f. Brutus\")."
      - pred: "vocab:hasDprrID"
        range: "xsd:string"
        comment: "Unique DPRR identifier string (e.g. \"IUNI0001\")."
      - pred: "vocab:hasID"
        range: "xsd:string"
        comment: "Internal database identifier (numeric string, e.g. \"1\")."
      - pred: "vocab:hasPraenomen"
        range: "vocab:Praenomen"
        comment: "The person's praenomen (first name). Links to a Praenomen entity."
      - pred: "vocab:hasAltPraenomen"
        range: "xsd:string"
        comment: "Alternative praenomen if known."
      - pred: "vocab:hasNomen"
        range: "xsd:string"
        comment: "The person's nomen (family/clan name), e.g. \"Cornelius\"."
      - pred: "vocab:hasCognomen"
        range: "xsd:string"
        comment: "The person's cognomen (third name / surname)."
      - pred: "vocab:hasOtherNames"
        range: "xsd:string"
        comment: "Any additional names or name variants."
      - pred: "vocab:hasFiliation"
        range: "xsd:string"
        comment: "Patronymic filiation string (e.g. 'M. f.' for Marci filius)."
      - pred: "vocab:isSex"
        range: "vocab:Sex"
        comment: "The sex of the person. Use the full entity URI: <http://romanrepublic.ac.uk/rdf/entity/Sex/Male> or <http://romanrepublic.ac.uk/rdf/entity/Sex/Female>."
      - pred: "vocab:hasEraFrom"
        range: "xsd:integer"
        comment: "Start of the person's active era. Negative values = BC."
      - pred: "vocab:hasEraTo"
        range: "xsd:integer"
        comment: "End of the person's active era. Negative values = BC."
      - pred: "vocab:hasHighestOffice"
        range: "xsd:string"
        comment: "Free-text summary (e.g. 'cos. 509'). NOT linked to an Office entity — use PostAssertion for structured office queries."
      - pred: "vocab:hasOrigin"
        range: "xsd:string"
        comment: "Geographic origin as free text. Use CONTAINS() or REGEX() for flexible matching."
      - pred: "vocab:isPatrician"
        range: "xsd:boolean"
        comment: "Only `true` values are stored. To find non-patricians: FILTER NOT EXISTS { ?person vocab:isPatrician true }."
      - pred: "vocab:isNobilis"
        range: "xsd:boolean"
        comment: "Only `true` values are stored. To find non-nobiles: FILTER NOT EXISTS { ?person vocab:isNobilis true }."
      - pred: "vocab:isNovus"
        range: "xsd:boolean"
        comment: "Only `true` values are stored. To find non-novi homines: FILTER NOT EXISTS { ?person vocab:isNovus true }."
      - pred: "vocab:hasReNumber"
        range: "xsd:string"
        comment: "Reference number in RE (e.g. \"46a, Supb. 5.356ff.\")."
      - pred: "vocab:hasPersonNote"
        range: "vocab:PersonNote"
        comment: "Notes associated with this person."
      - pred: "vocab:isPraenomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:isNomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:isCognomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:isFiliationUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:isOtherNamesUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:isPatricianUncertain"
        range: "xsd:boolean"
        comment: "Only `true` stored; absence = not uncertain."
      - pred: "vocab:hasNobilisNotes"
        range: "xsd:string"
        comment: "Notes on the person's nobilis classification."
      - pred: "vocab:hasNovusNotes"
        range: "xsd:string"
        comment: "Notes on the person's novus homo classification."
      - pred: "vocab:hasReNumberOld"
        range: "xsd:string"
        comment: "Old/superseded RE reference number."
      - pred: "vocab:hasAssociatedWebpage"
        range: "xsd:string"
        comment: "URL to the person's page on the DPRR website."

  PostAssertion:
    label: "Post Assertion"
    comment: "An assertion that a person held a particular office or post. Multiple sources create separate assertions; always use COUNT(DISTINCT ?person) when counting holders."
    uri: "vocab:PostAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this assertion is about."
      - pred: "vocab:hasOffice"
        range: "vocab:Office"
        comment: "The office or post held."
      - pred: "vocab:hasDateStart"
        range: "xsd:integer"
        comment: "Start date of the post. Negative = BC."
      - pred: "vocab:hasDateEnd"
        range: "xsd:integer"
        comment: "End date of the post. Negative = BC."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:hasDateSecondarySource"
        range: "vocab:SecondarySource"
        comment: "Secondary source specifically for the date of this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this assertion is uncertain."
      - pred: "vocab:isDateStartUncertain"
        range: "xsd:boolean"
        comment: "Whether the start date is uncertain."
      - pred: "vocab:isDateEndUncertain"
        range: "xsd:boolean"
        comment: "Whether the end date is uncertain."
      - pred: "vocab:hasPostAssertionNote"
        range: "xsd:string"
        comment: "Notes about this post assertion (links to PostAssertionNote entity)."
      - pred: "vocab:hasOriginalText"
        range: "xsd:string"
        comment: "Original text from the source for this assertion."
      - pred: "vocab:hasPosition"
        range: "xsd:string"
        comment: "Ordering position number (for display). Not the office — use hasOffice for that."

  PostAssertionProvince:
    label: "Post Assertion Province"
    comment: "Links a PostAssertion to a Province. Province is NOT on PostAssertion directly; query this intermediary using hasPostAssertion → PostAssertion and hasProvince → Province."
    uri: "vocab:PostAssertionProvince"
    properties:
      - pred: "vocab:hasPostAssertion"
        range: "vocab:PostAssertion"
        comment: "The post assertion this province assignment belongs to."
      - pred: "vocab:hasProvince"
        range: "vocab:Province"
        comment: "The province where the office was held."
      - pred: "vocab:hasID"
        range: "xsd:string"
        comment: "Internal database identifier."
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Label (e.g. \"Post Assertion Province: #895\")."
      - pred: "vocab:isProvinceUncertain"
        range: "xsd:boolean"
        comment: "Whether the province assignment is uncertain."

  RelationshipAssertion:
    label: "Relationship Assertion"
    comment: "An assertion of a family or social relationship between two persons. 6,928 instances exist covering 36 relationship types."
    uri: "vocab:RelationshipAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The primary person in the relationship."
      - pred: "vocab:hasRelatedPerson"
        range: "vocab:Person"
        comment: "The related person in the relationship."
      - pred: "vocab:hasRelationship"
        range: "vocab:Relationship"
        comment: "The type of relationship (e.g. \"Relationship: father of\")."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:hasRelationshipReference"
        range: "xsd:string"
        comment: "Reference to the relationship assertion source details."

  StatusAssertion:
    label: "Status Assertion"
    comment: "An assertion about a person's social or political status (senator or eques Romanus)."
    uri: "vocab:StatusAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this status assertion is about."
      - pred: "vocab:hasStatus"
        range: "vocab:Status"
        comment: "The status: \"Status: senator\" or \"Status: eques Romanus\"."
      - pred: "vocab:hasDateStart"
        range: "xsd:integer"
        comment: "Start date of the status. Negative = BC."
      - pred: "vocab:hasDateEnd"
        range: "xsd:integer"
        comment: "End date of the status. Negative = BC."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this status assertion is uncertain."
      - pred: "vocab:isDateStartUncertain"
        range: "xsd:boolean"
        comment: "Whether the start date is uncertain."
      - pred: "vocab:isDateEndUncertain"
        range: "xsd:boolean"
        comment: "Whether the end date is uncertain."
      - pred: "vocab:hasStatusAssertionNote"
        range: "xsd:string"
        comment: "Notes about this status assertion."
      - pred: "vocab:hasOriginalText"
        range: "xsd:string"
        comment: "Original text from the source."
      - pred: "vocab:hasDateSourceText"
        range: "xsd:string"
        comment: "Source text for the date information."

  DateInformation:
    label: "Date Information"
    comment: "Dated biographical information about a person (birth, death, floruit, etc.)."
    uri: "vocab:DateInformation"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this date information is about."
      - pred: "vocab:hasDateType"
        range: "vocab:DateType"
        comment: "The type of date (birth, death, proscribed, etc.)."
      - pred: "vocab:hasValue"
        range: "xsd:integer"
        comment: "The date value. Negative = BC."
      - pred: "vocab:hasDateInterval"
        range: "xsd:string"
        comment: "Date interval qualifier: S (same), B (before), A (after)."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this date information."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this date information is uncertain."
      - pred: "vocab:hasNotes"
        range: "xsd:string"
        comment: "Notes about this date information."

  TribeAssertion:
    label: "Tribe Assertion"
    comment: "An assertion that a person belonged to a particular Roman tribe."
    uri: "vocab:TribeAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this tribe assertion is about."
      - pred: "vocab:hasTribe"
        range: "vocab:Tribe"
        comment: "The Roman tribe."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this tribe assertion is uncertain."

  Office:
    label: "Office"
    comment: "A political or religious office (204 offices). Offices form a hierarchy via hasParent. Use STRSTARTS on rdfs:label for grouped queries."
    uri: "vocab:Office"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Office: consul\", \"Office: praetor\", \"Office: tribunus plebis\")."
      - pred: "vocab:hasAbbreviation"
        range: "xsd:string"
        comment: "Abbreviated name (e.g. \"cos.\" for consul)."
      - pred: "vocab:hasName"
        range: "xsd:string"
        comment: "Plain name without prefix (e.g. \"consul\")."
      - pred: "vocab:hasParent"
        range: "vocab:Office"
        comment: "Parent office in the office hierarchy."

  Province:
    label: "Province"
    comment: "A Roman province or territorial assignment (92 provinces)."
    uri: "vocab:Province"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Province: Latium\", \"Province: Sicilia\")."
      - pred: "vocab:hasName"
        range: "xsd:string"
        comment: "Plain name without prefix (e.g. \"Latium\")."
      - pred: "vocab:hasParent"
        range: "vocab:Province"
        comment: "Parent province in the geographic hierarchy."

  Sex:
    label: "Sex"
    comment: "Sex classification. Only two instances: entity URIs entity:Sex/Male and entity:Sex/Female."
    uri: "vocab:Sex"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "\"Sex: Male\" or \"Sex: Female\"."

  Praenomen:
    label: "Praenomen"
    comment: "A Roman praenomen (first name). 45 instances."
    uri: "vocab:Praenomen"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Abbreviated form prefixed with \"Praenomen: \" (e.g. \"Praenomen: L.\", \"Praenomen: M.\"). NOT the full name."
      - pred: "vocab:hasName"
        range: "xsd:string"
        comment: "Full praenomen (e.g. \"Lucius\", \"Marcus\")."
      - pred: "vocab:Abbreviation"
        range: "xsd:string"
        comment: "Abbreviated form (e.g. \"L.\", \"M.\")."

  Tribe:
    label: "Tribe"
    comment: "A Roman voting tribe (37 tribes)."
    uri: "vocab:Tribe"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Tribe: Cornelia\", \"Tribe: Papiria\")."
      - pred: "vocab:hasAbbreviation"
        range: "xsd:string"
        comment: "Abbreviated name for the tribe."

  SecondarySource:
    label: "Secondary Source"
    comment: "A modern scholarly secondary source (32 sources)."
    uri: "vocab:SecondarySource"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Secondary Source: Broughton MRR I\")."
      - pred: "vocab:hasAbbreviation"
        range: "xsd:string"
        comment: "Abbreviated citation key (e.g. \"Broughton MRR I\")."
      - pred: "vocab:hasBiblio"
        range: "xsd:string"
        comment: "Full bibliographic reference."
      - pred: "vocab:hasName"
        range: "xsd:string"
        comment: "Full title of the source."

  PrimarySource:
    label: "Primary Source"
    comment: "An ancient primary source (2 instances)."
    uri: "vocab:PrimarySource"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Primary Source: Livy\")."
      - pred: "vocab:hasAbbreviation"
        range: "xsd:string"
        comment: "Abbreviated citation key."
      - pred: "vocab:hasBiblio"
        range: "xsd:string"
        comment: "Full bibliographic reference."

  Status:
    label: "Status"
    comment: "A social or political status. Only two instances: \"Status: senator\" and \"Status: eques Romanus\"."
    uri: "vocab:Status"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "\"Status: senator\" or \"Status: eques Romanus\"."

  Relationship:
    label: "Relationship"
    comment: "A type of family or social relationship (44 types including inverses)."
    uri: "vocab:Relationship"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Relationship: father of\", \"Relationship: adopted son of\")."

  PersonNote:
    label: "Person Note"
    comment: "A note attached to a person record."
    uri: "vocab:PersonNote"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The text of the note."

  DateType:
    label: "Date Type"
    comment: "A type of biographical date. 10 types: birth, death, death - violent, attested, proscribed, exiled, expelled from Senate, extradited, recalled, restored."
    uri: "vocab:DateType"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Prefixed label (e.g. \"Date Type: birth\", \"Date Type: death\", \"Date Type: proscribed\")."
