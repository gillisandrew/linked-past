tips:
  - id: boolean_open_world
    title: "Boolean properties use open-world semantics"
    body: >
      Properties like isPatrician, isNobilis, isNovus, and all uncertainty flags
      only store `true` values. Querying `?person vocab:isPatrician false` returns
      0 rows. Use: FILTER NOT EXISTS { ?person vocab:isPatrician true }.

  - id: count_distinct
    title: "Multiple PostAssertions per office-holding — use COUNT(DISTINCT ?person)"
    body: >
      A single person holding one office can generate multiple PostAssertion triples
      (one per secondary source). Always use COUNT(DISTINCT ?person), not COUNT(?assertion).

  - id: office_subtypes
    title: "Offices have subtypes — use STRSTARTS to match all variants"
    body: >
      Offices form a hierarchy via hasParent. "Office: consul" only matches
      ordinary consuls, not "Office: consul suffectus" or "Office: consul
      designatus". Use FILTER(STRSTARTS(?officeName, "Office: consul")) for
      all consul types. Same for dictator, aedilis, quaestor, etc.

  - id: province_via_intermediary
    title: "Provinces are NOT on PostAssertion directly"
    body: >
      To find the province for a post, join through PostAssertionProvince:
      ?pap vocab:hasPostAssertion ?assertion ; vocab:hasProvince ?province .
      Not all offices have province assignments (e.g. consuls typically do not).

  - id: praenomen_labels
    title: "Praenomen labels use abbreviations, not full names"
    body: >
      Praenomen rdfs:label is "Praenomen: L." (abbreviated), not "Praenomen: Lucius".
      Use vocab:hasName on Praenomen to get the full name "Lucius".

  - id: sex_entity_uris
    title: "Sex uses full entity URIs, not label matching"
    body: >
      Filter sex using the entity URI directly:
      ?person vocab:isSex <http://romanrepublic.ac.uk/rdf/entity/Sex/Male> .
      Or match via rdfs:label "Sex: Male" / "Sex: Female".

  - id: integer_date_filters
    title: "Date fields are integers — compare directly"
    body: >
      hasDateStart, hasDateEnd, hasEraFrom, hasEraTo, hasValue are xsd:integer.
      Negative = BC. Compare directly: FILTER(?dateStart = -63). No cast needed.

  - id: uri_comparison
    title: "URI comparison requires STR() cast"
    body: >
      When comparing two URI variables (e.g. to find distinct pairs), cast to
      string: FILTER(STR(?person1) < STR(?person2)).

  - id: bind_for_grouping
    title: "Use BIND for computed GROUP BY expressions"
    body: >
      Complex expressions in GROUP BY often fail. Use BIND to create a named
      variable, then GROUP BY that variable.

  - id: highest_office_is_text
    title: "hasHighestOffice is free text, not linked to Office"
    body: >
      vocab:hasHighestOffice is a free-text summary like "cos. 509". For
      structured office queries, use PostAssertion with vocab:hasOffice.

  - id: relationship_directionality
    title: "Relationships are directional — isAboutPerson vs hasRelatedPerson"
    body: >
      "father of" means isAboutPerson is the father, hasRelatedPerson is the
      child. To find someone's father, filter for "Relationship: father of"
      where hasRelatedPerson is your target person.

  - id: relationship_labels
    title: "36 relationship types — no 'wife/husband of', use 'married to'"
    body: >
      Common labels (by frequency): "Relationship: brother of", "son of",
      "father of", "married to", "sister of", "mother of", "daughter of",
      "grandfather of", "grandson of", "related to", "adopted son of",
      "adoptive father of", "divorced from", "uncle of", "nephew of",
      "cousin of", "betrothed to". There is no "wife of" or "husband of" —
      marriage uses "married to" (symmetric). Use CONTAINS() to search
      when unsure of the exact label.

  - id: cross_class_join_performance
    title: "Multi-class joins can timeout — use FILTER ... IN () over ||"
    body: >
      Joining two assertion classes (e.g. StatusAssertion + DateInformation)
      on the same ?person can be slow. Prefer FILTER(?x IN ("a", "b"))
      over FILTER(?x = "a" || ?x = "b"). If a query times out, try
      reordering triple patterns to put the most selective pattern first.

  - id: uncertainty_and_notes
    title: "Surface uncertainty flags, notes, and source text"
    body: >
      All assertion classes have vocab:isUncertain (boolean, only true
      stored). PostAssertion also has isDateStartUncertain / isDateEndUncertain.
      To exclude uncertain data: FILTER NOT EXISTS { ?a vocab:isUncertain true }.
      For provenance, include hasOriginalText (literal string on PostAssertion
      and StatusAssertion) and hasDateSourceText (on StatusAssertion) via
      OPTIONAL. DateInformation has hasNotes (literal). Note entity fields
      (hasPostAssertionNote, hasStatusAssertionNote, hasPersonNote,
      hasRelationshipReference) return entity URIs, not text — dereference
      with vocab:hasNoteText for note text (e.g. OPTIONAL {
      ?a vocab:hasPostAssertionNote ?note . ?note vocab:hasNoteText ?noteText }).
      hasRelationshipReference uses vocab:hasExtraInfo instead of hasNoteText.
