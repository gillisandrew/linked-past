classes:
  Place:
    label: "Place"
    comment: "An ancient geographic place (~41,000 places covering the Greek and Roman world)"
    uri: "pleiades:Place"
    properties:
      - pred: "dcterms:title"
        range: "xsd:string"
        comment: "Display title"
      - pred: "dcterms:description"
        range: "xsd:string"
        comment: "Textual description"
      - pred: "pleiades:hasLocation"
        range: "pleiades:Location"
        comment: "Links to Location entities with coordinates"
      - pred: "pleiades:hasName"
        range: "pleiades:Name"
        comment: "Links to Name entities with attested/romanized forms"
      - pred: "pleiades:hasFeatureType"
        range: "skos:Concept"
        comment: "Feature type from controlled vocabulary"
      - pred: "prov:wasDerivedFrom"
        range: "xsd:anyURI"
        comment: "Provenance source"
      - pred: "cito:citesForEvidence"
        range: "xsd:anyURI"
        comment: "Bibliographic citation"

  Location:
    label: "Location"
    comment: "Physical location with coordinates and geometry. A Place may have multiple Locations for different time periods."
    uri: "pleiades:Location"
    properties:
      - pred: "dcterms:title"
        range: "xsd:string"
        comment: "Location label"
      - pred: "geo:lat"
        range: "xsd:float"
        comment: "WGS84 latitude"
      - pred: "geo:long"
        range: "xsd:float"
        comment: "WGS84 longitude"
      - pred: "osgeo:asGeoJSON"
        range: "xsd:string"
        comment: "GeoJSON geometry"
      - pred: "pleiades:during"
        range: "skos:Concept"
        comment: "Time period (SKOS concept, not a date literal)"
      - pred: "pleiades:start_date"
        range: "xsd:string"
        comment: "Earliest CE year"
      - pred: "pleiades:end_date"
        range: "xsd:string"
        comment: "Latest CE year"

  Name:
    label: "Name"
    comment: "An appellation of a place in historical context"
    uri: "pleiades:Name"
    properties:
      - pred: "pleiades:nameAttested"
        range: "xsd:string"
        comment: "Attested form in original script"
      - pred: "pleiades:nameRomanized"
        range: "xsd:string"
        comment: "Romanized form"
      - pred: "pleiades:during"
        range: "skos:Concept"
        comment: "Time period"
