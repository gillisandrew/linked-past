classes:
  Inscription:
    label: "Inscription"
    comment: "A Latin inscription from the Epigraphic Database Heidelberg. Contains transcription texts, dating, monument type, and findspot information."
    uri: "epi:Inscription"
    properties:
      - pred: "skos:prefLabel"
        range: "xsd:string"
        comment: "Label summarising inscription type and findspot (e.g., 'epitaph found at Roma (Latium)')"
      - pred: "epi:editionText"
        range: "xsd:string"
        comment: "Scholarly edition of the inscription text with expanded abbreviations"
      - pred: "epi:diplomaticText"
        range: "xsd:string"
        comment: "Diplomatic transcription — text as carved on the stone"
      - pred: "epi:representsTypeOfInscription"
        range: "xsd:anyURI"
        comment: "Type of inscription (e.g., epitaph, votive, honorary)"
      - pred: "epi:representsTypeOfMonument"
        range: "xsd:anyURI"
        comment: "Type of monument (e.g., stele, altar, sarcophagus)"
      - pred: "nmo:hasMaterial"
        range: "xsd:anyURI"
        comment: "Material of the inscription (links to concept URI)"
      - pred: "nmo:hasStartDate"
        range: "xsd:string"
        comment: "Earliest date for the inscription (string like '0071')"
      - pred: "nmo:hasEndDate"
        range: "xsd:string"
        comment: "Latest date for the inscription (string like '0130')"
      - pred: "lawd:foundAt"
        range: "xsd:anyURI"
        comment: "Findspot — links to an EDH geography place URI"

  GeographyPlace:
    label: "Geography Place"
    comment: "A findspot or geographic location in the EDH gazetteer. May link to Pleiades or Geonames."
    uri: "edh:geography_place"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Place name"
      - pred: "skos:prefLabel"
        range: "xsd:string"
        comment: "Preferred place label"

  Person:
    label: "Person"
    comment: "A person attested in an EDH inscription."
    uri: "edh:person"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Person name as attested"
