classes:
  CoinType:
    label: "Coin Type"
    comment: "A Roman Republican coin type from Crawford's RRC typology. Each type describes a denomination, authority, mint, material, and obverse/reverse iconography."
    uri: "nmo:TypeSeriesItem"
    properties:
      - pred: "skos:prefLabel"
        range: "xsd:string"
        comment: "Type label (e.g., 'RRC 44/5')"
      - pred: "nmo:hasAuthority"
        range: "foaf:Person"
        comment: "Issuing authority (links to Nomisma person URI)"
      - pred: "nmo:hasDenomination"
        range: "nmo:Denomination"
        comment: "Coin denomination (links to Nomisma, e.g., nm:denarius)"
      - pred: "nmo:hasMint"
        range: "nmo:Mint"
        comment: "Minting location (links to Nomisma mint URI)"
      - pred: "nmo:hasMaterial"
        range: "nmo:Material"
        comment: "Coin material (links to Nomisma, e.g., nm:ar for silver)"
      - pred: "nmo:hasStartDate"
        range: "xsd:gYear"
        comment: "Earliest date of production"
      - pred: "nmo:hasEndDate"
        range: "xsd:gYear"
        comment: "Latest date of production"
      - pred: "nmo:hasObverse"
        range: "xsd:anyURI"
        comment: "Obverse die description (fragment URI with #obverse)"
      - pred: "nmo:hasReverse"
        range: "xsd:anyURI"
        comment: "Reverse die description (fragment URI with #reverse)"
      - pred: "dcterms:source"
        range: "xsd:anyURI"
        comment: "Reference catalog (typically nm:rrc for Crawford's RRC)"
      - pred: "void:inDataset"
        range: "xsd:anyURI"
        comment: "Dataset provenance (http://numismatics.org/crro/)"
