classes:
  CoinType:
    label: "Coin Type"
    comment: "A Roman Imperial coin type from RIC (Roman Imperial Coinage). Documents denomination, authority (emperor), mint, material, and obverse/reverse iconography."
    uri: "nmo:TypeSeriesItem"
    properties:
      - pred: "skos:prefLabel"
        range: "xsd:string"
        comment: "Type label (e.g., 'RIC I (Second Edition) Augustus 1A')"
      - pred: "nmo:hasAuthority"
        range: "foaf:Person"
        comment: "Issuing authority — emperor or imperial figure (Nomisma person URI)"
      - pred: "nmo:hasDenomination"
        range: "nmo:Denomination"
        comment: "Coin denomination (nm:denarius, nm:aureus, nm:sestertius, etc.)"
      - pred: "nmo:hasMint"
        range: "nmo:Mint"
        comment: "Minting location (Nomisma mint URI)"
      - pred: "nmo:hasMaterial"
        range: "nmo:Material"
        comment: "Coin material (nm:ar silver, nm:av gold, nm:ae bronze)"
      - pred: "nmo:hasStartDate"
        range: "xsd:gYear"
        comment: "Earliest date of production"
      - pred: "nmo:hasEndDate"
        range: "xsd:gYear"
        comment: "Latest date of production"
      - pred: "nmo:hasObverse"
        range: "xsd:anyURI"
        comment: "Obverse description (fragment URI)"
      - pred: "nmo:hasReverse"
        range: "xsd:anyURI"
        comment: "Reverse description (fragment URI)"
      - pred: "dcterms:source"
        range: "xsd:anyURI"
        comment: "Reference catalog (nm:ric)"
      - pred: "void:inDataset"
        range: "xsd:anyURI"
        comment: "Dataset provenance (http://numismatics.org/ocre/)"
