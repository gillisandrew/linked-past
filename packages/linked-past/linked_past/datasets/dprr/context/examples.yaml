examples:
  - question: "List all consuls in the Roman Republic"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?dateStart ?dateEnd
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label "Office: consul" .
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
        OPTIONAL { ?assertion dprr:hasDateEnd ?dateEnd }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Find all female persons in the database"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      SELECT DISTINCT ?person ?name
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:isSex <http://romanrepublic.ac.uk/rdf/entity/Sex/Female> .
      }
      ORDER BY ?name
      LIMIT 100

  - question: "Who were the father-son relationships in the Republic?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?fatherName ?sonName
      WHERE {
        ?assertion a dprr:RelationshipAssertion ;
                   dprr:isAboutPerson ?father ;
                   dprr:hasRelatedPerson ?son ;
                   dprr:hasRelationship ?rel .
        ?rel rdfs:label "Relationship: father of" .
        ?father dprr:hasPersonName ?fatherName .
        ?son dprr:hasPersonName ?sonName .
      }
      ORDER BY ?fatherName
      LIMIT 100

  - question: "Which persons belonged to the tribe Cornelia?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name
      WHERE {
        ?assertion a dprr:TribeAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasTribe ?tribe .
        ?tribe rdfs:label "Tribe: Cornelia" .
        ?person dprr:hasPersonName ?name .
      }
      ORDER BY ?name
      LIMIT 100

  - question: "What offices were held in the province of Sicilia?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?officeName ?dateStart
      WHERE {
        ?pap a dprr:PostAssertionProvince ;
             dprr:hasProvince ?province ;
             dprr:hasPostAssertion ?assertion .
        ?province rdfs:label "Province: Sicilia" .
        ?assertion dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label ?officeName .
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Who held the office of praetor in 63 BC?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office ;
                   dprr:hasDateStart ?dateStart .
        ?office rdfs:label "Office: praetor" .
        FILTER(?dateStart = -63)
        ?person dprr:hasPersonName ?name .
      }
      ORDER BY ?name
      LIMIT 100

  - question: "Find persons active between 100 BC and 50 BC"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      SELECT DISTINCT ?person ?name ?eraFrom ?eraTo
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:hasEraFrom ?eraFrom ;
                dprr:hasEraTo ?eraTo .
        FILTER(?eraFrom >= -100 && ?eraTo <= -50)
      }
      ORDER BY ?eraFrom
      LIMIT 100

  - question: "How many persons are in the database?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      SELECT (COUNT(DISTINCT ?person) AS ?total)
      WHERE {
        ?person a dprr:Person .
      }

  - question: "What offices did a specific person hold? (e.g., find by nomen Tullius and cognomen Cicero)"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?name ?officeName ?dateStart ?dateEnd
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:hasNomen "Tullius" ;
                dprr:hasCognomen "Cicero" .
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label ?officeName .
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
        OPTIONAL { ?assertion dprr:hasDateEnd ?dateEnd }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Find the top moneyers (tresviri monetales) by number of post assertions"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?person ?name (COUNT(DISTINCT ?assertion) AS ?assertions) ?dateStart
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label ?officeName .
        FILTER(CONTAINS(?officeName, "monetalis"))
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
      }
      GROUP BY ?person ?name ?dateStart
      ORDER BY DESC(?assertions)
      LIMIT 20

  - question: "Find persons with the nomen Cornelius"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?praenomenLabel ?cognomen
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:hasNomen "Cornelius" .
        OPTIONAL { ?person dprr:hasPraenomen ?prae . ?prae rdfs:label ?praenomenLabel }
        OPTIONAL { ?person dprr:hasCognomen ?cognomen }
      }
      ORDER BY ?name
      LIMIT 100

  - question: "Count how many persons held each office"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?officeName (COUNT(DISTINCT ?person) AS ?holderCount)
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label ?officeName .
      }
      GROUP BY ?officeName
      ORDER BY DESC(?holderCount)
      LIMIT 100

  - question: "Find non-patrician consuls"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?dateStart
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label "Office: consul" .
        ?person dprr:hasPersonName ?name .
        FILTER NOT EXISTS { ?person dprr:isPatrician true }
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Find all persons who held any type of dictator office"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?officeName ?dateStart
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label ?officeName .
        FILTER(STRSTARTS(?officeName, "Office: dictator"))
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?assertion dprr:hasDateStart ?dateStart }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Find all date information records of type death"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?value ?interval
      WHERE {
        ?di a dprr:DateInformation ;
            dprr:isAboutPerson ?person ;
            dprr:hasDateType ?dtype ;
            dprr:hasValue ?value .
        ?dtype rdfs:label "Date Type: death" .
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?di dprr:hasDateInterval ?interval }
      }
      ORDER BY ?value
      LIMIT 100

  - question: "Which equites Romani held the office of consul?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?dateStart
      WHERE {
        ?sa a dprr:StatusAssertion ;
            dprr:isAboutPerson ?person ;
            dprr:hasStatus ?status .
        ?status rdfs:label "Status: eques Romanus" .
        ?pa a dprr:PostAssertion ;
            dprr:isAboutPerson ?person ;
            dprr:hasOffice ?office .
        ?office rdfs:label "Office: consul" .
        ?person dprr:hasPersonName ?name .
        OPTIONAL { ?pa dprr:hasDateStart ?dateStart }
      }
      ORDER BY ?dateStart
      LIMIT 100

  - question: "Find persons who held both consul and praetor"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name
      WHERE {
        ?pa1 a dprr:PostAssertion ;
             dprr:isAboutPerson ?person ;
             dprr:hasOffice ?office1 .
        ?office1 rdfs:label "Office: consul" .
        ?pa2 a dprr:PostAssertion ;
             dprr:isAboutPerson ?person ;
             dprr:hasOffice ?office2 .
        ?office2 rdfs:label "Office: praetor" .
        ?person dprr:hasPersonName ?name .
      }
      ORDER BY ?name
      LIMIT 100

  - question: "Find pairs of consuls who served in the same year"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?name1 ?name2 ?year
      WHERE {
        ?pa1 a dprr:PostAssertion ;
             dprr:isAboutPerson ?person1 ;
             dprr:hasOffice ?office1 ;
             dprr:hasDateStart ?year .
        ?office1 rdfs:label "Office: consul" .
        ?pa2 a dprr:PostAssertion ;
             dprr:isAboutPerson ?person2 ;
             dprr:hasOffice ?office2 ;
             dprr:hasDateStart ?year .
        ?office2 rdfs:label "Office: consul" .
        ?person1 dprr:hasPersonName ?name1 .
        ?person2 dprr:hasPersonName ?name2 .
        FILTER(STR(?person1) < STR(?person2))
      }
      ORDER BY ?year
      LIMIT 100

  - question: "Which gentes produced the most consuls?"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?nomen (COUNT(DISTINCT ?person) AS ?consulCount)
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office .
        ?office rdfs:label "Office: consul" .
        ?person dprr:hasNomen ?nomen .
      }
      GROUP BY ?nomen
      ORDER BY DESC(?consulCount)
      LIMIT 20

  - question: "Find persons named Lucius Cornelius"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?person ?name ?cognomen
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:hasNomen "Cornelius" ;
                dprr:hasPraenomen ?prae .
        ?prae dprr:hasName "Lucius" .
        OPTIONAL { ?person dprr:hasCognomen ?cognomen }
      }
      ORDER BY ?name
      LIMIT 100

  - question: "Look up a person by their DPRR ID"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      SELECT ?person ?name ?nomen ?cognomen ?eraFrom ?eraTo
      WHERE {
        ?person a dprr:Person ;
                dprr:hasPersonName ?name ;
                dprr:hasDprrID "IUNI0001" .
        OPTIONAL { ?person dprr:hasNomen ?nomen }
        OPTIONAL { ?person dprr:hasCognomen ?cognomen }
        OPTIONAL { ?person dprr:hasEraFrom ?eraFrom }
        OPTIONAL { ?person dprr:hasEraTo ?eraTo }
      }
      LIMIT 10

  - question: "Find adoption relationships"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT ?adopterName ?adopteeName ?relType
      WHERE {
        ?assertion a dprr:RelationshipAssertion ;
                   dprr:isAboutPerson ?adopter ;
                   dprr:hasRelatedPerson ?adoptee ;
                   dprr:hasRelationship ?rel .
        ?rel rdfs:label ?relType .
        FILTER(CONTAINS(?relType, "adopt"))
        ?adopter dprr:hasPersonName ?adopterName .
        ?adoptee dprr:hasPersonName ?adopteeName .
      }
      ORDER BY ?adopterName
      LIMIT 100

  - question: "Count consuls by century"
    sparql: |
      PREFIX dprr: <http://romanrepublic.ac.uk/rdf/ontology#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?century (COUNT(DISTINCT ?person) AS ?consulCount)
      WHERE {
        ?assertion a dprr:PostAssertion ;
                   dprr:isAboutPerson ?person ;
                   dprr:hasOffice ?office ;
                   dprr:hasDateStart ?year .
        ?office rdfs:label "Office: consul" .
        BIND(IF(?year <= -400, "5th c. BC",
          IF(?year <= -300, "4th c. BC",
          IF(?year <= -200, "3rd c. BC",
          IF(?year <= -100, "2nd c. BC",
          "1st c. BC")))) AS ?century)
      }
      GROUP BY ?century
      ORDER BY ?century
      LIMIT 100
