examples:
  - question: "List all Roman provincial coin types with their authorities and denominations"
    sparql: |
      PREFIX nmo: <http://nomisma.org/ontology#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      PREFIX nm: <http://nomisma.org/id/>
      SELECT ?type ?label ?authority ?authorityLabel ?denomination ?denominationLabel
      WHERE {
        ?type a nmo:TypeSeriesItem ;
              skos:prefLabel ?label .
        OPTIONAL { ?type nmo:hasAuthority ?authority .
                   ?authority skos:prefLabel ?authorityLabel
                   FILTER(LANG(?authorityLabel) = "en") }
        OPTIONAL { ?type nmo:hasDenomination ?denomination .
                   ?denomination skos:prefLabel ?denominationLabel
                   FILTER(LANG(?denominationLabel) = "en") }
      }
      ORDER BY ?label
      LIMIT 100

  - question: "Find all coin types minted at a specific provincial mint (e.g., Antioch)"
    sparql: |
      PREFIX nmo: <http://nomisma.org/ontology#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX nm: <http://nomisma.org/id/>
      SELECT ?type ?label ?authority ?authorityLabel ?startDate
      WHERE {
        ?type a nmo:TypeSeriesItem ;
              skos:prefLabel ?label ;
              nmo:hasMint nm:antioch .
        OPTIONAL { ?type nmo:hasAuthority ?authority .
                   ?authority skos:prefLabel ?authorityLabel
                   FILTER(LANG(?authorityLabel) = "en") }
        OPTIONAL { ?type nmo:hasStartDate ?startDate }
      }
      ORDER BY ?startDate

  - question: "Count provincial coin types by emperor"
    sparql: |
      PREFIX nmo: <http://nomisma.org/ontology#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?authority ?authorityLabel (COUNT(?type) AS ?count)
      WHERE {
        ?type a nmo:TypeSeriesItem ;
              nmo:hasAuthority ?authority .
        ?authority skos:prefLabel ?authorityLabel .
        FILTER(LANG(?authorityLabel) = "en")
      }
      GROUP BY ?authority ?authorityLabel
      ORDER BY DESC(?count)

  - question: "Find bronze provincial coins from a date range (e.g., 27 BC to 14 AD, Augustus)"
    sparql: |
      PREFIX nmo: <http://nomisma.org/ontology#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX nm: <http://nomisma.org/id/>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
      SELECT ?type ?label ?mint ?mintLabel ?startDate ?endDate
      WHERE {
        ?type a nmo:TypeSeriesItem ;
              skos:prefLabel ?label ;
              nmo:hasMaterial nm:ae .
        OPTIONAL { ?type nmo:hasMint ?mint .
                   ?mint skos:prefLabel ?mintLabel
                   FILTER(LANG(?mintLabel) = "en") }
        OPTIONAL { ?type nmo:hasStartDate ?startDate }
        OPTIONAL { ?type nmo:hasEndDate ?endDate }
        FILTER(?startDate >= "-0026"^^xsd:gYear && ?startDate <= "0014"^^xsd:gYear)
      }
      ORDER BY ?startDate

  - question: "List all provincial mints with type counts"
    sparql: |
      PREFIX nmo: <http://nomisma.org/ontology#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?mint ?mintLabel (COUNT(?type) AS ?count)
      WHERE {
        ?type a nmo:TypeSeriesItem ;
              nmo:hasMint ?mint .
        ?mint skos:prefLabel ?mintLabel .
        FILTER(LANG(?mintLabel) = "en")
      }
      GROUP BY ?mint ?mintLabel
      ORDER BY DESC(?count)
