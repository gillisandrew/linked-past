classes:
  CoinType:
    label: "Coin Type"
    comment: "A Roman provincial coin type from the RPC typology. Each type describes a denomination, issuing authority, mint, material, and obverse/reverse iconography for coins minted in Roman provinces."
    uri: "nmo:TypeSeriesItem"
    properties:
      - pred: "skos:prefLabel"
        range: "xsd:string"
        comment: "Type label (e.g., 'RPC I 1001')"
      - pred: "nmo:hasAuthority"
        range: "foaf:Person"
        comment: "Issuing authority — emperor or local magistrate (Nomisma person URI)"
      - pred: "nmo:hasDenomination"
        range: "nmo:Denomination"
        comment: "Coin denomination (links to Nomisma, e.g., nm:denarius)"
      - pred: "nmo:hasMint"
        range: "nmo:Mint"
        comment: "Provincial minting location (links to Nomisma mint URI)"
      - pred: "nmo:hasMaterial"
        range: "nmo:Material"
        comment: "Coin material (links to Nomisma, e.g., nm:ae for bronze)"
      - pred: "nmo:hasStartDate"
        range: "xsd:gYear"
        comment: "Earliest date of production"
      - pred: "nmo:hasEndDate"
        range: "xsd:gYear"
        comment: "Latest date of production"
      - pred: "nmo:hasObverse"
        range: "xsd:anyURI"
        comment: "Obverse die description (fragment URI with #obverse)"
      - pred: "nmo:hasReverse"
        range: "xsd:anyURI"
        comment: "Reverse die description (fragment URI with #reverse)"
      - pred: "dcterms:source"
        range: "xsd:anyURI"
        comment: "Reference catalog (nm:rpc)"
      - pred: "void:inDataset"
        range: "xsd:anyURI"
        comment: "Dataset provenance (https://rpc.ashmus.ox.ac.uk/)"
