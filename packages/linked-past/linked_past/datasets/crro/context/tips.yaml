tips:
  - title: "rrc_source_filter"
    body: "All CRRO types have dcterms:source nm:rrc (Crawford's Roman Republican Coinage). Include this in queries to restrict to CRRO types vs other Nomisma data."
    classes: ["CoinType"]

  - title: "issuer_links_to_nomisma_persons"
    body: |
      nmo:hasIssuer links coin types to Nomisma person URIs (e.g., nm:julius_caesar).
      IMPORTANT: These person URIs have their skos:prefLabel in the Nomisma dataset,
      NOT in the CRRO dataset. To get issuer names, either:
      1. Query the Nomisma dataset separately for the person label, or
      2. Use search_entities/explore_entity on the Nomisma URI.
      Do NOT expect ?issuer skos:prefLabel ?name to work in a CRRO-only query.
      The predicate nmo:hasAuthority is NOT used in CRRO — use nmo:hasIssuer instead.
    classes: ["CoinType"]

  - title: "date_encoding"
    body: |
      Dates are stored as xsd:gYear strings with 4-digit zero-padding.
      Republican dates are negative: 100 BC = "-0099", 44 BC = "-0043".
      IMPORTANT: String comparison does NOT work for date ranges because
      "-0100" < "-0043" is TRUE as strings but WRONG chronologically.
      Always cast to integer for comparisons:
        FILTER(xsd:integer(?startDate) >= -100 && xsd:integer(?startDate) <= -44)
      Or cast to xsd:gYear:
        FILTER(?startDate >= "-0100"^^xsd:gYear)
    classes: ["CoinType"]

  - title: "obverse_reverse_fragments"
    body: |
      nmo:hasObverse and nmo:hasReverse link to fragment URIs (e.g., crro:rrc-44.5#obverse).
      These fragments contain iconographic descriptions and legends — you MUST join through them:
        WRONG: ?type nmo:hasPortrait ?portrait .
        RIGHT: ?type nmo:hasObverse ?obv . ?obv nmo:hasPortrait ?portrait .
      Available fragment properties: nmo:hasPortrait, dcterms:description, nmo:hasLegend.
    classes: ["CoinType"]

  - title: "intermediate_resource_pattern"
    body: |
      CRRO coin types use intermediate resources for obverse/reverse details.
      Do NOT query properties like nmo:hasPortrait, nmo:hasLegend, or dcterms:description
      directly on the TypeSeriesItem. You must go through nmo:hasObverse or nmo:hasReverse first:
        ?type nmo:hasObverse ?obv .
        ?obv nmo:hasPortrait ?portrait .
        ?obv dcterms:description ?desc .
      Direct properties on TypeSeriesItem include: nmo:hasIssuer, nmo:hasMint,
      nmo:hasDenomination, nmo:hasMaterial, nmo:hasStartDate, nmo:hasEndDate,
      nmo:hasManufacture, skos:prefLabel, dcterms:source.
    classes: ["CoinType"]

  - title: "denomination_mint_material_are_nomisma_concepts"
    body: "Denominations (nm:denarius), mints (nm:rome), and materials (nm:ar, nm:av, nm:ae) are Nomisma concept URIs. Use the Nomisma dataset for their labels and definitions."
    classes: ["CoinType"]
