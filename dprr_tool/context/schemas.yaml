classes:
  Person:
    label: "Person"
    comment: "A historical person from the Roman Republic period."
    uri: "vocab:Person"
    properties:
      - pred: "vocab:hasPersonName"
        range: "xsd:string"
        comment: "Full display name. Format: \"DPRRID Praenomen Nomen (RE#) Filiation Cognomen\" (e.g. \"IUNI0001 L. Iunius (46a, Supb. 5.356ff.) M. f. Brutus\")."
      - pred: "vocab:hasDprrID"
        range: "xsd:string"
        comment: "Unique DPRR identifier string (e.g. \"IUNI0001\")."
      - pred: "vocab:hasID"
        range: "xsd:string"
        comment: "Internal database identifier (numeric string, e.g. \"1\")."
      - pred: "vocab:hasPraenomen"
        range: "vocab:Praenomen"
        comment: "The person's praenomen (first name)."
      - pred: "vocab:hasAltPraenomen"
        range: "xsd:string"
        comment: "Alternative praenomen if known."
      - pred: "vocab:hasNomen"
        range: "xsd:string"
        comment: "The person's nomen (family/clan name)."
      - pred: "vocab:hasCognomen"
        range: "xsd:string"
        comment: "The person's cognomen (third name / surname)."
      - pred: "vocab:hasOtherNames"
        range: "xsd:string"
        comment: "Any additional names or name variants."
      - pred: "vocab:hasFiliation"
        range: "xsd:string"
        comment: "Patronymic filiation string (e.g. 'M.f.' for Marci filius)."
      - pred: "vocab:isSex"
        range: "vocab:Sex"
        comment: "The sex of the person (Male or Female)."
      - pred: "vocab:hasEraFrom"
        range: "xsd:integer"
        comment: "Start of the person's active era. Negative values indicate BC."
      - pred: "vocab:hasEraTo"
        range: "xsd:integer"
        comment: "End of the person's active era. Negative values indicate BC."
      - pred: "vocab:hasHighestOffice"
        range: "xsd:string"
        comment: "Free-text summary (e.g. 'cos. 107'). NOT linked to an Office entity — use PostAssertion for structured office queries."
      - pred: "vocab:hasOrigin"
        range: "xsd:string"
        comment: "Geographic origin as free text. May include '?' for uncertainty, citations (e.g. 'Tusculum (Farney E35)'), or regions. Use CONTAINS() or REGEX() for flexible matching."
      - pred: "vocab:isPatrician"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not patrician (or unknown). To find non-patricians, use FILTER NOT EXISTS { ?person vocab:isPatrician true }."
      - pred: "vocab:isNobilis"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not nobilis (or unknown). To find non-nobiles, use FILTER NOT EXISTS { ?person vocab:isNobilis true }."
      - pred: "vocab:isNovus"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not novus homo (or unknown). To find non-novi homines, use FILTER NOT EXISTS { ?person vocab:isNovus true }."
      - pred: "vocab:hasReNumber"
        range: "xsd:string"
        comment: "Reference number in Broughton's MRR or RE."
      - pred: "vocab:hasPersonNote"
        range: "vocab:PersonNote"
        comment: "Notes associated with this person."
      - pred: "vocab:isPraenomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain. Use FILTER NOT EXISTS to find persons with certain praenomina."
      - pred: "vocab:isNomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain. Use FILTER NOT EXISTS to find persons with certain nomina."
      - pred: "vocab:isCognomenUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain. Use FILTER NOT EXISTS to find persons with certain cognomina."
      - pred: "vocab:isReNumberUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain."
      - pred: "vocab:isFiliationUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain."
      - pred: "vocab:isOtherNamesUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain."
      - pred: "vocab:isPatricianUncertain"
        range: "xsd:boolean"
        comment: "Only `true` values are stored; absence means not uncertain."
      - pred: "vocab:hasNobilisNotes"
        range: "xsd:string"
        comment: "Notes on the person's nobilis classification."
      - pred: "vocab:hasNovusNotes"
        range: "xsd:string"
        comment: "Notes on the person's novus homo classification."
      - pred: "vocab:hasReNumberOld"
        range: "xsd:string"
        comment: "Old/superseded RE reference number."
      - pred: "vocab:hasAssociatedWebpage"
        range: "xsd:string"
        comment: "URL to the person's page on the DPRR website."

  PostAssertion:
    label: "Post Assertion"
    comment: "An assertion that a person held a particular office or post. Multiple sources create separate assertions per office-holding; always use COUNT(DISTINCT ?person) when counting holders."
    uri: "vocab:PostAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this assertion is about."
      - pred: "vocab:hasOffice"
        range: "vocab:Office"
        comment: "The office or post held."
      - pred: "vocab:hasDateStart"
        range: "xsd:integer"
        comment: "Start date of the post. Negative values indicate BC."
      - pred: "vocab:hasDateEnd"
        range: "xsd:integer"
        comment: "End date of the post. Negative values indicate BC."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this assertion is uncertain."
      - pred: "vocab:isDateStartUncertain"
        range: "xsd:boolean"
        comment: "Whether the start date is uncertain."
      - pred: "vocab:isDateEndUncertain"
        range: "xsd:boolean"
        comment: "Whether the end date is uncertain."
      - pred: "vocab:hasPostAssertionNote"
        range: "xsd:string"
        comment: "Notes about this post assertion."
      - pred: "vocab:hasOriginalText"
        range: "xsd:string"
        comment: "Original text from the source for this assertion."

  PostAssertionProvince:
    label: "Post Assertion Province"
    comment: "Links a PostAssertion to a Province. Province is not stored directly on PostAssertion; instead, query this intermediary class using hasPostAssertion to reach the PostAssertion and hasProvince to reach the Province."
    uri: "vocab:PostAssertionProvince"
    properties:
      - pred: "vocab:hasPostAssertion"
        range: "vocab:PostAssertion"
        comment: "The post assertion this province assignment belongs to."
      - pred: "vocab:hasProvince"
        range: "vocab:Province"
        comment: "The province where the office was held."
      - pred: "vocab:hasID"
        range: "xsd:string"
        comment: "Internal database identifier."
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Label. Prefixed with \"Post Assertion Province: \" (e.g. \"Post Assertion Province: #3897\")."
      - pred: "vocab:isProvinceUncertain"
        range: "xsd:boolean"
        comment: "Whether the province assignment is uncertain."

  RelationshipAssertion:
    label: "Relationship Assertion"
    comment: "An assertion of a family or social relationship between two persons."
    uri: "vocab:RelationshipAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The primary person in the relationship."
      - pred: "vocab:hasRelatedPerson"
        range: "vocab:Person"
        comment: "The related person in the relationship."
      - pred: "vocab:hasRelationship"
        range: "vocab:Relationship"
        comment: "The type of relationship."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this relationship assertion is uncertain."

  StatusAssertion:
    label: "Status Assertion"
    comment: "An assertion about a person's social or political status."
    uri: "vocab:StatusAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this status assertion is about."
      - pred: "vocab:hasStatus"
        range: "vocab:Status"
        comment: "The status being asserted."
      - pred: "vocab:hasDateStart"
        range: "xsd:integer"
        comment: "Start date of the status. Negative values indicate BC."
      - pred: "vocab:hasDateEnd"
        range: "xsd:integer"
        comment: "End date of the status. Negative values indicate BC."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this status assertion is uncertain."
      - pred: "vocab:isDateStartUncertain"
        range: "xsd:boolean"
        comment: "Whether the start date is uncertain."
      - pred: "vocab:isDateEndUncertain"
        range: "xsd:boolean"
        comment: "Whether the end date is uncertain."

  DateInformation:
    label: "Date Information"
    comment: "Dated biographical information about a person (birth, death, floruit, etc.)."
    uri: "vocab:DateInformation"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this date information is about."
      - pred: "vocab:hasDateType"
        range: "vocab:DateType"
        comment: "The type of date (birth, death, floruit, etc.)."
      - pred: "vocab:hasValue"
        range: "xsd:integer"
        comment: "The date value. Negative values indicate BC."
      - pred: "vocab:hasDateInterval"
        range: "xsd:string"
        comment: "Date interval qualifier: S (same), B (before), A (after)."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this date information."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this date information is uncertain."
      - pred: "vocab:hasSourceText"
        range: "xsd:string"
        comment: "Original source text for this date information."

  TribeAssertion:
    label: "Tribe Assertion"
    comment: "An assertion that a person belonged to a particular Roman tribe."
    uri: "vocab:TribeAssertion"
    properties:
      - pred: "vocab:isAboutPerson"
        range: "vocab:Person"
        comment: "The person this tribe assertion is about."
      - pred: "vocab:hasTribe"
        range: "vocab:Tribe"
        comment: "The Roman tribe."
      - pred: "vocab:hasSecondarySource"
        range: "vocab:SecondarySource"
        comment: "The secondary source for this assertion."
      - pred: "vocab:isUncertain"
        range: "xsd:boolean"
        comment: "Whether this tribe assertion is uncertain."

  Office:
    label: "Office"
    comment: "A political or religious office in the Roman Republic. Offices form a hierarchy via hasParent. Use STRSTARTS on rdfs:label for grouped queries (e.g. all dictator subtypes). Note: 'tribunus militum consulari potestate' is separate from 'consul'."
    uri: "vocab:Office"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the office. Prefixed with \"Office: \" (e.g. \"Office: consul\", \"Office: praetor\")."
      - pred: "vocab:hasID"
        range: "xsd:integer"
        comment: "Internal database identifier."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated name for the office."
      - pred: "vocab:hasDescription"
        range: "xsd:string"
        comment: "Description of the office."
      - pred: "vocab:hasParent"
        range: "vocab:Office"
        comment: "Parent office in the office hierarchy."

  Province:
    label: "Province"
    comment: "A Roman province or territorial assignment."
    uri: "vocab:Province"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the province. Prefixed with \"Province: \" (e.g. \"Province: Latium\", \"Province: Gallia Cisalpina\")."
      - pred: "vocab:hasID"
        range: "xsd:integer"
        comment: "Internal database identifier."
      - pred: "vocab:hasDescription"
        range: "xsd:string"
        comment: "Description of the province."
      - pred: "vocab:hasParent"
        range: "vocab:Province"
        comment: "Parent province in the geographic hierarchy."

  Sex:
    label: "Sex"
    comment: "Sex classification (Male or Female)."
    uri: "vocab:Sex"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "Label for the sex. Prefixed with \"Sex: \" (e.g. \"Sex: Male\", \"Sex: Female\")."

  Praenomen:
    label: "Praenomen"
    comment: "A Roman praenomen (first name)."
    uri: "vocab:Praenomen"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The full praenomen. Prefixed with \"Praenomen: \" (e.g. \"Praenomen: Lucius\", \"Praenomen: Marcus\")."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated form of the praenomen (e.g. 'M.' for Marcus)."

  Tribe:
    label: "Tribe"
    comment: "A Roman voting tribe."
    uri: "vocab:Tribe"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the tribe. Prefixed with \"Tribe: \" (e.g. \"Tribe: Cornelia\", \"Tribe: Aemilia\")."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated name for the tribe."

  SecondarySource:
    label: "Secondary Source"
    comment: "A modern scholarly secondary source."
    uri: "vocab:SecondarySource"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name or title of the source. Prefixed with \"Secondary Source: \" (e.g. \"Secondary Source: Broughton MRR I\")."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated name or citation key."
      - pred: "vocab:hasBiblio"
        range: "xsd:string"
        comment: "Full bibliographic reference."

  PrimarySource:
    label: "Primary Source"
    comment: "An ancient primary source."
    uri: "vocab:PrimarySource"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name or title of the primary source. Prefixed with \"Primary Source: \" (e.g. \"Primary Source: Livy\")."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated name or citation key."
      - pred: "vocab:hasBiblio"
        range: "xsd:string"
        comment: "Full bibliographic reference."

  Status:
    label: "Status"
    comment: "A social or political status category."
    uri: "vocab:Status"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the status. Prefixed with \"Status: \" (e.g. \"Status: senator\", \"Status: eques Romanus\")."
      - pred: "vocab:hasAbbrevName"
        range: "xsd:string"
        comment: "Abbreviated name for the status."
      - pred: "vocab:hasDescription"
        range: "xsd:string"
        comment: "Description of the status."

  Relationship:
    label: "Relationship"
    comment: "A type of family or social relationship."
    uri: "vocab:Relationship"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the relationship type. Prefixed with \"Relationship: \" (e.g. \"Relationship: father of\", \"Relationship: brother of\")."
      - pred: "vocab:hasDescription"
        range: "xsd:string"
        comment: "Description of the relationship type."

  PersonNote:
    label: "Person Note"
    comment: "A note attached to a person record."
    uri: "vocab:PersonNote"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The text of the note."

  DateType:
    label: "Date Type"
    comment: "A type of biographical date (birth, death, floruit, etc.)."
    uri: "vocab:DateType"
    properties:
      - pred: "rdfs:label"
        range: "xsd:string"
        comment: "The name of the date type. Prefixed with \"Date Type: \" (e.g. \"Date Type: birth\", \"Date Type: death\")."
      - pred: "vocab:hasDescription"
        range: "xsd:string"
        comment: "Description of the date type."
