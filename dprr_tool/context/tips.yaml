tips:
  - id: boolean_open_world
    title: "Boolean properties use open-world semantics"
    body: >
      Properties like isPatrician, isNobilis, isNovus, and all uncertainty flags
      (isPraenomenUncertain, etc.) only store `true` values. There are no `false`
      triples in the data. Querying `?person vocab:isPatrician false` will always
      return 0 rows. To find persons who are NOT patrician (or whose status is
      unknown), use: FILTER NOT EXISTS { ?person vocab:isPatrician true }.

  - id: uri_comparison
    title: "URI comparison requires STR() cast"
    body: >
      When comparing two URI variables (e.g. to find pairs of distinct persons),
      direct comparison like `FILTER(?person1 < ?person2)` may silently fail or
      return unexpected results. Always cast to string first:
      FILTER(STR(?person1) < STR(?person2)).

  - id: bind_for_grouping
    title: "Use BIND(IF(...)) for computed GROUP BY expressions"
    body: >
      Complex expressions directly in GROUP BY often fail or produce unexpected
      results in SPARQL engines. Instead, use BIND to create a named variable,
      then GROUP BY that variable. Example: BIND(IF(?year <= -400, "5th c. BC",
      IF(?year <= -300, "4th c. BC", "other")) AS ?century) then GROUP BY ?century.

  - id: count_distinct
    title: "Multiple PostAssertions per office-holding — use COUNT(DISTINCT ?person)"
    body: >
      A single person holding one office can generate multiple PostAssertion triples
      (one per secondary source). When counting how many people held an office,
      always use COUNT(DISTINCT ?person), not COUNT(?person) or COUNT(?assertion).

  - id: office_subtypes
    title: "Office subtypes and hierarchy — use STRSTARTS or hasParent"
    body: >
      Offices form a hierarchy via the hasParent property. For example, "dictator
      rei gerundae causa" is a subtype of "dictator". To match all subtypes of an
      office, use STRSTARTS on the label: FILTER(STRSTARTS(?officeName, "Office: dictator")).
      Alternatively, traverse the hierarchy with vocab:hasParent.

  - id: consul_vs_suffectus
    title: "'consul' and 'consul suffectus' are separate offices"
    body: >
      The office labeled "Office: consul" only matches ordinary consuls. Suffect
      consuls are stored under the separate label "Office: consul suffectus". To
      find all consuls (both ordinary and suffect), use STRSTARTS:
      FILTER(STRSTARTS(?officeName, "Office: consul")).

  - id: highest_office_is_text
    title: "hasHighestOffice is free text, not linked to Office"
    body: >
      The Person property vocab:hasHighestOffice contains a free-text summary string
      like "cos. 107" or "pr. 78?". It is NOT linked to an Office entity. For
      structured office queries, always use PostAssertion with vocab:hasOffice
      pointing to an Office resource.
