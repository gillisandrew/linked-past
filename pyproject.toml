[project]
name = "dprr-tool"
version = "0.1.0"
description = "Natural language SPARQL queries for the Digital Prosopography of the Roman Republic"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pyoxigraph",
    "rdflib",
    "click",
    "rich",
    "pyyaml",
    "mcp",
    "toons>=0.5.3",
]

[project.scripts]
dprr-tool = "dprr_tool.cli:cli"
dprr-server = "dprr_tool.mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
]
analysis = [
    "pandas",
]
