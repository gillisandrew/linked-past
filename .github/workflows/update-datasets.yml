name: Update Datasets

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset to update'
        required: true
        type: choice
        options:
          - pleiades
          - periodo
          - nomisma
          - crro
          - all
      version:
        description: 'Version tag (default: latest)'
        required: false
        default: 'latest'

# EDH and DPRR are excluded — their source data requires manual download
# (EDH: funding expired, data frozen; DPRR: upstream serves CAPTCHAs)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Install ORAS CLI
        run: |
          curl -LO https://github.com/oras-project/oras/releases/latest/download/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz
          sudo mv oras /usr/local/bin/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update selected dataset
        run: |
          VERSION="${{ inputs.version }}"
          DATASET="${{ inputs.dataset }}"

          if [ "$DATASET" = "all" ]; then
            for ds in pleiades periodo nomisma crro; do
              echo "=== Packaging $ds ==="
              uv run python scripts/package_${ds}.py "$VERSION"
            done
          else
            echo "=== Packaging $DATASET ==="
            uv run python scripts/package_${DATASET}.py "$VERSION"
          fi

      - name: Tag as latest
        if: inputs.version != 'latest'
        run: |
          DATASET="${{ inputs.dataset }}"
          VERSION="${{ inputs.version }}"

          if [ "$DATASET" = "all" ]; then
            for ds in pleiades periodo nomisma crro; do
              oras tag ghcr.io/gillisandrew/linked-past/${ds}:${VERSION} latest
            done
          else
            oras tag ghcr.io/gillisandrew/linked-past/${DATASET}:${VERSION} latest
          fi
