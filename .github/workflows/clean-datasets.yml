name: Clean Datasets

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to clean and publish"
        required: true
        type: choice
        options:
          - dprr
          - pleiades
          - periodo
          - nomisma
          - crro
          - ocre
          - rpc
          - edh
          - all
      version:
        description: "Version tag (default: latest)"
        required: false
        default: "latest"

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync

      - name: Install ORAS CLI
        run: |
          ORAS_VERSION="1.2.2"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          sudo mv oras /usr/local/bin/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Clean and validate datasets
        run: |
          VERSION="${{ inputs.version }}"
          DATASET="${{ inputs.dataset }}"

          if [ "$DATASET" = "all" ]; then
            DATASETS=$(uv run python -c "import yaml; print(' '.join(yaml.safe_load(open('datasets.yaml')).keys()))")
          else
            DATASETS="$DATASET"
          fi

          for ds in $DATASETS; do
            echo "=== Cleaning $ds ==="
            uv run python -m scripts.clean_dataset "$ds" "$VERSION"
            echo "=== Validating $ds ==="
            uv run python -m scripts.validate_dataset "$ds"
          done

      - name: Tag as latest
        if: inputs.version != 'latest'
        run: |
          VERSION="${{ inputs.version }}"
          DATASET="${{ inputs.dataset }}"

          if [ "$DATASET" = "all" ]; then
            DATASETS=$(uv run python -c "import yaml; print(' '.join(yaml.safe_load(open('datasets.yaml')).keys()))")
          else
            DATASETS="$DATASET"
          fi

          for ds in $DATASETS; do
            REF=$(uv run python -c "import yaml; print(yaml.safe_load(open('datasets.yaml'))['$ds']['clean_ref'].rsplit(':', 1)[0])")
            oras tag "${REF}:${VERSION}" latest
          done
